name: "Generate Session — Step 1: Send Code"

on:
  workflow_dispatch: {}

jobs:
  send_code:
    runs-on: ubuntu-latest
    steps:
      - name: Install telethon
        run: pip install telethon

      - name: Send auth code and print session + hash
        env:
          PHONE:    ${{ secrets.TELEGRAM_PHONE }}
          API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          python3 - << 'EOF'
          import asyncio, os
          from telethon import TelegramClient
          from telethon.sessions import StringSession
          async def main():
              client = TelegramClient(
                  StringSession(),
                  int(os.environ["API_ID"]),
                  os.environ["API_HASH"],
              )
              await client.connect()
              sent = await client.send_code_request(os.environ["PHONE"])
              session = client.session.save()
              print("Код отправлен в Telegram!")
              print()
              print(">>> Скопируй ЭТИ ДВЕ строки в Step 2 <<<")
              print()
              print("partial_session =", session)
              print("phone_code_hash =", sent.phone_code_hash)
              print()
              print(">>> Конец <<<")
          asyncio.run(main())
          EOF
