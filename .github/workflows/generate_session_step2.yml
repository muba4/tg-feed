name: "Generate Session — Step 2: Complete Auth"

on:
  workflow_dispatch:
    inputs:
      partial_session:
        description: 'partial_session из логов Step 1'
        required: true
      phone_code_hash:
        description: 'phone_code_hash из логов Step 1'
        required: true
      code:
        description: 'Код из Telegram (5-6 цифр)'
        required: true
      # phone, api_id, api_hash больше не нужны в inputs
      password:
        description: 'Пароль 2FA (если включён, иначе оставь пустым)'
        required: false
        default: ''

jobs:
  complete_auth:
    runs-on: ubuntu-latest
    steps:
      - name: Install telethon
        run: pip install telethon

      - name: Complete authentication and print session string
        env:
          PARTIAL_SESSION:  ${{ github.event.inputs.partial_session }}
          PHONE_CODE_HASH:  ${{ github.event.inputs.phone_code_hash }}
          CODE:             ${{ github.event.inputs.code }}
          # Берём из secrets:
          PHONE:            ${{ secrets.TELEGRAM_PHONE }}
          API_ID:           ${{ secrets.TELEGRAM_API_ID }}
          API_HASH:         ${{ secrets.TELEGRAM_API_HASH }}
          PASSWORD:         ${{ github.event.inputs.password }}
        run: |
          python3 - << 'EOF'
          import asyncio, os
          from telethon import TelegramClient
          from telethon.sessions import StringSession
          from telethon.errors import SessionPasswordNeededError

          async def main():
              client = TelegramClient(
                  StringSession(os.environ["PARTIAL_SESSION"].strip()),
                  int(os.environ["API_ID"]),
                  os.environ["API_HASH"],
              )
              await client.connect()
              try:
                  await client.sign_in(
                      os.environ["PHONE"],
                      os.environ["CODE"],
                      phone_code_hash=os.environ["PHONE_CODE_HASH"].strip(),
                  )
              except SessionPasswordNeededError:
                  pw = os.environ.get("PASSWORD", "")
                  if not pw:
                      raise RuntimeError("2FA включён — введи пароль в поле 'password'")
                  await client.sign_in(password=pw)

              me = await client.get_me()
              session = client.session.save()
              await client.disconnect()

              # Вместо print("TELEGRAM_SESSION_STR =", session)
              # Записываем в файл в корне репозитория
              with open("TELEGRAM_SESSION_STR.txt", "w", encoding="utf-8") as f:
                  f.write(session)

              print("Session string saved to TELEGRAM_SESSION_STR.txt")
              print("Please copy it from the file in the repository root and add to GitHub Secrets.")
              print("Then DELETE the file from the repository for security.")

          asyncio.run(main())
          EOF
